[build]
  command = "npm run build && cd server && npm install"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["server/.env"]

# Route all API calls to the serverless Express function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Support React Router client-side routing on page reload
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
